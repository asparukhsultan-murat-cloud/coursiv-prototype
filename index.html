<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coursiv AI Tools - Smart Templates</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Fonts (Inter & Playwrite/Script style for logo) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Caveat:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; }
        .coursiv-logo { font-family: 'Caveat', cursive; color: #5c46e4; }
        .input-shadow { box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03); }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col antialiased bg-white">

    <!-- НАВИГАЦИОННАЯ ПАНЕЛЬ ОДИН В ОДИН ПО СКРИНШОТУ -->
    <header class="border-b border-slate-100 bg-white sticky top-0 z-50 px-8 py-3 flex items-center justify-between">
        <!-- Левая часть: Оригинальный рукописный логотип -->
        <div class="flex items-center">
            <span class="text-3xl font-bold coursiv-logo tracking-wide select-none">Coursiv</span>
        </div>
        
        <!-- Центр: Вкладки навигации с иконками -->
        <nav class="hidden md:flex items-center space-x-8 text-[14px] font-medium text-slate-500">
            <a href="#" class="flex items-center space-x-2 hover:text-slate-800 transition">
                <span>🏠</span> <span>Home</span>
            </a>
            <a href="#" class="flex items-center space-x-2 hover:text-slate-800 transition">
                <span>🎓</span> <span>Courses</span>
            </a>
            <a href="#" class="flex items-center space-x-2 text-indigo-600 font-semibold transition">
                <span>✨</span> <span>AI Tools</span>
            </a>
            <a href="#" class="flex items-center space-x-2 hover:text-slate-800 transition">
                <span>🏋️‍♂️</span> <span>AI Practice</span>
            </a>
        </nav>

        <!-- Правая часть: Статусы и Профиль -->
        <div class="flex items-center space-x-5">
            <!-- Безлимитный премиум-значок -->
            <div class="bg-slate-50 border border-slate-100 rounded-full px-3 py-1 flex items-center space-x-1.5 text-xs text-slate-600 font-medium shadow-sm">
                <span class="text-indigo-500 font-bold">✦</span>
                <span>∞</span>
            </div>
            <!-- История -->
            <button class="text-slate-400 hover:text-slate-600 transition cursor-pointer text-sm">🕒</button>
            <!-- Профиль пользователя -->
            <div class="flex items-center space-x-2 cursor-pointer group">
                <div class="w-7 h-7 rounded-full bg-slate-100 border border-slate-200 flex items-center justify-center text-xs font-semibold text-slate-500">A</div>
                <span class="text-xs font-medium text-slate-500 group-hover:text-slate-800 transition">Profile</span>
            </div>
        </div>
    </header>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <main class="flex-1 max-w-4xl w-full mx-auto px-4 pt-16 flex flex-col items-center">
        
        <!-- Главный заголовок -->
        <h1 id="mainTitle" class="text-2xl md:text-[26px] font-semibold text-slate-900 tracking-tight text-center mb-8">
            What can I help with?
        </h1>

        <!-- ЦЕНТРАЛЬНЫЙ КОНТЕЙНЕР ВВОДА -->
        <div class="w-full max-w-2xl bg-white border border-slate-200 rounded-2xl p-4 input-shadow transition-all duration-300">
            
            <!-- РЕЖИМ 1: Стандартный пустой инпут (дефолтный вид по скриншоту) -->
            <div id="standardInputView" class="w-full">
                <textarea id="standardTextArea" placeholder="Ask anything" rows="3" class="w-full resize-none bg-transparent text-[15px] text-slate-800 placeholder-slate-400 focus:outline-none leading-relaxed"></textarea>
            </div>

            <!-- РЕЖИМ 2: Смарт-Форма (Активируется по клику на шаблоны) -->
            <div id="smartFormView" class="w-full hidden space-y-4 pt-1 pb-2">
                <div class="flex items-center justify-between border-b border-slate-100 pb-2 mb-1">
                    <span id="activeFormBadge" class="text-xs font-semibold text-indigo-600 bg-indigo-50 px-2.5 py-1 rounded-md border border-indigo-100/50">
                        ⚡ Smart Form Active
                    </span>
                    <button onclick="switchToStandardMode()" class="text-xs text-slate-400 hover:text-slate-600 font-medium flex items-center space-x-1 cursor-pointer">
                        <span>✕</span> <span>Reset to Standard</span>
                    </button>
                </div>

                <!-- Динамические поля для Текстовых задач (Маркетинг, Саммари и т.д.) -->
                <div id="textFormInputs" class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <div class="flex flex-col space-y-1">
                        <label class="text-[11px] font-medium text-slate-400 uppercase tracking-wider">Product Name</label>
                        <input type="text" id="paramProduct" value="Coursiv App" oninput="liveCompilePrompt()" class="bg-slate-50/50 border border-slate-200 rounded-xl px-3 py-2 text-sm text-slate-800 focus:outline-none focus:border-indigo-500">
                    </div>
                    <div class="flex flex-col space-y-1">
                        <label class="text-[11px] font-medium text-slate-400 uppercase tracking-wider">Target Audience</label>
                        <input type="text" id="paramAudience" value="Digital Marketers" oninput="liveCompilePrompt()" class="bg-slate-50/50 border border-slate-200 rounded-xl px-3 py-2 text-sm text-slate-800 focus:outline-none focus:border-indigo-500">
                    </div>
                    <div class="flex flex-col space-y-1 md:col-span-2">
                        <label class="text-[11px] font-medium text-slate-400 uppercase tracking-wider">Key Benefit / Goal</label>
                        <input type="text" id="paramGoal" value="Increase feature activation speed and engagement tools adoption" oninput="liveCompilePrompt()" class="bg-slate-50/50 border border-slate-200 rounded-xl px-3 py-2 text-sm text-slate-800 focus:outline-none focus:border-indigo-500">
                    </div>
                </div>

                <!-- Динамические поля для Графики (SD 3.5 / Dall-E) -->
                <div id="imageFormInputs" class="hidden grid grid-cols-1 md:grid-cols-2 gap-3">
                    <div class="flex flex-col space-y-1 md:col-span-2">
                        <label class="text-[11px] font-medium text-slate-400 uppercase tracking-wider">Subject Description</label>
                        <input type="text" id="paramSubject" value="Futuristic office workspace with smooth neon ambient lights" oninput="liveCompilePrompt()" class="bg-slate-50/50 border border-slate-200 rounded-xl px-3 py-2 text-sm text-slate-800 focus:outline-none focus:border-indigo-500">
                    </div>
                    <div class="flex flex-col space-y-1">
                        <label class="text-[11px] font-medium text-slate-400 uppercase tracking-wider">Visual Style</label>
                        <select id="paramStyle" onchange="liveCompilePrompt()" class="bg-slate-50/50 border border-slate-200 rounded-xl px-3 py-2 text-sm text-slate-800 focus:outline-none focus:border-indigo-500 cursor-pointer">
                            <option value="Cinematic photography, highly detailed, 8k resolution">Cinematic Photography</option>
                            <option value="3D clay rendering style, isometric composition, pastel palette">Minimalist 3D Clay</option>
                            <option value="Cyberpunk digital concept art, dark background, sharp focus">Cyberpunk Digital Art</option>
                        </select>
                    </div>
                    <div class="flex flex-col space-y-1">
                        <label class="text-[11px] font-medium text-slate-400 uppercase tracking-wider">Aspect Ratio</label>
                        <select id="paramRatio" onchange="liveCompilePrompt()" class="bg-slate-50/50 border border-slate-200 rounded-xl px-3 py-2 text-sm text-slate-800 focus:outline-none focus:border-indigo-500 cursor-pointer">
                            <option value="16:9 widescreen layout">16:9 (Landscape)</option>
                            <option value="9:16 portrait mobile layout">9:16 (Portrait)</option>
                            <option value="1:1 square instagram canvas">1:1 (Square)</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- НИЖНЯЯ ПАНЕЛЬ ИНПУТА: Кнопки управления и селектор моделей -->
            <div class="flex items-center justify-between border-t border-slate-100 pt-3 mt-2">
                <!-- Плюс (Прикрепить файл) -->
                <div>
                    <button class="w-8 h-8 rounded-full hover:bg-slate-50 flex items-center justify-center text-slate-400 hover:text-slate-600 transition cursor-pointer text-lg font-light">+</button>
                </div>
                
                <!-- Правый блок: Модель + Микрофон + Отправка -->
                <div class="flex items-center space-x-3">
                    <!-- Селектор моделей (Стилизован один в один как Claude v на скрине) -->
                    <div class="relative">
                        <select id="modelSelect" onchange="onModelChange()" class="appearance-none bg-transparent hover:bg-slate-50 rounded-xl pl-3 pr-7 py-1.5 text-[14px] text-slate-700 font-medium focus:outline-none cursor-pointer transition">
                            <option value="gpt5">ChatGPT 5.4</option>
                            <option value="gemini">Gemini 3.1 Pro</option>
                            <option value="sd35">SD 3.5 Large</option>
                            <option value="banana">nano banana</option>
                        </select>
                        <span class="absolute right-2.5 top-1/2 -translate-y-1/2 text-[10px] text-slate-400 pointer-events-none">▼</span>
                    </div>

                    <!-- Микрофон -->
                    <button class="w-8 h-8 rounded-full hover:bg-slate-50 flex items-center justify-center text-slate-400 hover:text-slate-600 transition cursor-pointer text-sm">🎤</button>
                    
                    <!-- Кнопка отправки (Круглая стрелка вверх) -->
                    <button id="submitBtn" onclick="executePromptPipeline()" class="w-8 h-8 rounded-full bg-slate-100 text-slate-300 flex items-center justify-center transition cursor-pointer font-bold text-sm">
                        ↑
                    </button>
                </div>
            </div>
        </div>

        <!-- ЖИВОЙ КОМПИЛЯТОР ПРОМПТА (Появляется при активации Смарт-Формы) -->
        <div id="liveCompilerBox" class="w-full max-w-2xl mt-4 hidden bg-indigo-50/30 border border-indigo-100/60 rounded-xl p-3.5 transition-all duration-300">
            <div class="flex items-center justify-between mb-1.5">
                <span class="text-[11px] font-bold text-indigo-500 uppercase tracking-wider flex items-center space-x-1.5">
                    <span class="w-1.5 h-1.5 rounded-full bg-indigo-500 animate-pulse"></span>
                    <span>Live Prompt Compiler (Educational Layer)</span>
                </span>
                <span class="text-[10px] text-slate-400">Compiling real-time system variables</span>
            </div>
            <div id="compiledPromptText" class="text-xs font-mono text-slate-500 leading-relaxed bg-white/80 border border-indigo-50/50 p-2.5 rounded-lg max-h-24 overflow-y-auto">
                <!-- Генерируется через JS -->
            </div>
        </div>

        <!-- ПОДСКАЗКИ-ПИЛЮЛИ (Раздел под инпутом из скрина) -->
        <div id="suggestionsContainer" class="w-full max-w-xl mt-6 flex flex-wrap justify-center gap-2 transition-all duration-300">
            <button onclick="activateSmartForm('marketing')" class="px-3 py-1.5 bg-white border border-slate-200 rounded-full text-[13px] text-slate-600 hover:border-indigo-500 hover:text-indigo-600 flex items-center space-x-1.5 transition cursor-pointer shadow-sm">
                <span class="text-indigo-500 text-xs">🖼️</span> <span>Create an image</span>
            </button>
            <button onclick="activateSmartForm('advice')" class="px-3 py-1.5 bg-white border border-slate-200 rounded-full text-[13px] text-slate-600 hover:border-indigo-500 hover:text-indigo-600 flex items-center space-x-1.5 transition cursor-pointer shadow-sm">
                <span class="text-indigo-500 text-xs">💬</span> <span>Give advice</span>
            </button>
            <button onclick="activateSmartForm('ideas')" class="px-3 py-1.5 bg-white border border-slate-200 rounded-full text-[13px] text-slate-600 hover:border-indigo-500 hover:text-indigo-600 flex items-center space-x-1.5 transition cursor-pointer shadow-sm">
                <span class="text-indigo-500 text-xs">✨</span> <span>Generate ideas</span>
            </button>
            <button onclick="activateSmartForm('summary')" class="px-3 py-1.5 bg-white border border-slate-200 rounded-full text-[13px] text-slate-600 hover:border-indigo-500 hover:text-indigo-600 flex items-center space-x-1.5 transition cursor-pointer shadow-sm">
                <span class="text-indigo-500 text-xs">📄</span> <span>Summarize text</span>
            </button>
        </div>

        <!-- КОНСОЛЬ ВЫВОДА РЕЗУЛЬТАТА ИИ (AI SANDBOX CONSOLE) -->
        <div id="outputWorkspace" class="w-full max-w-2xl mt-8 hidden border border-slate-200 rounded-xl bg-slate-50/50 overflow-hidden shadow-sm transition-all duration-300 mb-12">
            <div class="bg-white border-b border-slate-100 px-4 py-2.5 flex items-center justify-between text-xs text-slate-400 font-medium font-mono">
                <div class="flex items-center space-x-2">
                    <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
                    <span class="text-slate-600">AI Inference Box</span>
                </div>
                <span id="latencyTimer">Processing pipeline...</span>
            </div>
            
            <div class="p-5 min-h-[150px] bg-white flex items-center justify-center">
                <!-- Спиннер загрузки -->
                <div id="aiLoader" class="flex flex-col items-center space-y-3">
                    <div class="w-7 h-7 border-3 border-indigo-100 border-t-indigo-600 rounded-full animate-spin"></div>
                    <span class="text-xs text-slate-400 font-mono">Streaming tokens from cluster...</span>
                </div>
                <!-- Текстовый ответ -->
                <div id="aiTextOutput" class="hidden w-full text-sm leading-relaxed text-slate-700 text-left space-y-2.5"></div>
                <!-- Графический ответ -->
                <div id="aiImageOutput" class="hidden w-full flex justify-center">
                    <img id="generatedImgNode" src="" alt="AI Output" class="max-w-md w-full h-auto rounded-lg border border-slate-100 shadow-md">
                </div>
            </div>
        </div>

    </main>

    <!-- СЦЕНАРИИ И ЛОГИКА ВЗАИМОДЕЙСТВИЯ (JAVASCRIPT) -->
    <script>
        // Справочник формул генерации промптов на основе переменных
        const promptCompilers = {
            marketing: () => `Act as an expert growth marketer. Construct high-converting landing page copy structure for "${document.getElementById('paramProduct').value}". Target Demographic Cohort: "${document.getElementById('paramAudience').value}". Core Optimization Objective: "${document.getElementById('paramGoal').value}". Apply direct response syntax rules.`,
            advice: () => `Provide deep strategic advisory recommendations regarding "${document.getElementById('paramGoal').value}" contextually optimized for "${document.getElementById('paramAudience').value}". Outlining multi-vector solutions for ${document.getElementById('paramProduct').value}.`,
            ideas: () => `Brainstorm 5 avant-garde product growth vector ideas focusing on "${document.getElementById('paramGoal').value}". Execution environment: ${document.getElementById('paramProduct').value}. Audiences parameters: ${document.getElementById('paramAudience').value}.`,
            summary: () => `Deconstruct and summarize the core business logic behind "${document.getElementById('paramGoal').value}". Extract high-value actionable items for ${document.getElementById('paramAudience').value}. Limit output latency.`,
            sd35: () => `Commercial premium visual conceptual render asset showcasing: ${document.getElementById('paramSubject').value}. Executed meticulously inside a ${document.getElementById('paramStyle').value} style environment. Canvas configuration aspect values fixed to ${document.getElementById('paramRatio').value}. Unreal Engine 5.4 render pipeline settings applied.`
        };

        let currentActiveTemplate = 'marketing';

        function liveCompilePrompt() {
            const compiledText = promptCompilers[currentActiveTemplate]();
            document.getElementById('compiledPromptText').textContent = compiledText;
            
            // Включаем кнопку отправки, если промпт готов
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.className = "w-8 h-8 rounded-full bg-indigo-600 text-white flex items-center justify-center transition cursor-pointer font-bold text-sm shadow-md shadow-indigo-600/20";
        }

        function activateSmartForm(type) {
            currentActiveTemplate = type;
            
            // Меняем заголовок и отображение блоков
            document.getElementById('standardInputView').classList.add('hidden');
            document.getElementById('smartFormView').classList.remove('hidden');
            document.getElementById('liveCompilerBox').classList.remove('hidden');
            
            const textInputs = document.getElementById('textFormInputs');
            const imageInputs = document.getElementById('imageFormInputs');
            const modelSelect = document.getElementById('modelSelect');
            const badge = document.getElementById('activeFormBadge');

            if (type === 'marketing') {
                textInputs.classList.remove('hidden');
                imageInputs.classList.add('hidden');
                modelSelect.value = 'gpt5';
                badge.textContent = "📝 Smart Form: Marketing Copy";
            } else if (type === 'advice') {
                textInputs.classList.remove('hidden');
                imageInputs.classList.add('hidden');
                modelSelect.value = 'gemini';
                badge.textContent = "💬 Smart Form: Strategic Advisor";
            } else if (type === 'ideas') {
                textInputs.classList.remove('hidden');
                imageInputs.classList.add('hidden');
                modelSelect.value = 'gpt5';
                badge.textContent = "✨ Smart Form: Ideation Matrix";
            } else if (type === 'summary') {
                textInputs.classList.remove('hidden');
                imageInputs.classList.add('hidden');
                modelSelect.value = 'banana';
                badge.textContent = "📄 Smart Form: Intelligent Summary";
            }

            liveCompilePrompt();
            document.getElementById('outputWorkspace').classList.add('hidden');
        }

        function onModelChange() {
            const model = document.getElementById('modelSelect').value;
            if (model === 'sd35') {
                currentActiveTemplate = 'sd35';
                document.getElementById('standardInputView').classList.add('hidden');
                document.getElementById('smartFormView').classList.remove('hidden');
                document.getElementById('liveCompilerBox').classList.remove('hidden');
                document.getElementById('textFormInputs').classList.add('hidden');
                document.getElementById('imageFormInputs').classList.remove('hidden');
                document.getElementById('activeFormBadge').textContent = "🖼️ Smart Form: Image Generation";
                liveCompilePrompt();
            } else if (document.getElementById('smartFormView').classList.contains('hidden')) {
                // Если мы в стандартном текстовом режиме — ничего не делаем
            } else {
                // Возвращаем дефолтную текстовую форму при переключении обратно на текст
                activateSmartForm('marketing');
            }
        }

        function switchToStandardMode() {
            document.getElementById('standardInputView').classList.remove('hidden');
            document.getElementById('smartFormView').classList.add('hidden');
            document.getElementById('liveCompilerBox').classList.add('hidden');
            document.getElementById('outputWorkspace').classList.add('hidden');
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.className = "w-8 h-8 rounded-full bg-slate-100 text-slate-300 flex items-center justify-center transition cursor-pointer font-bold text-sm";
        }

        function executePromptPipeline() {
            const outputBox = document.getElementById('outputWorkspace');
            const loader = document.getElementById('aiLoader');
            const textOut = document.getElementById('aiTextOutput');
            const imgOut = document.getElementById('aiImageOutput');
            const timer = document.getElementById('latencyTimer');

            outputBox.classList.remove('hidden');
            loader.classList.remove('hidden');
            textOut.classList.add('hidden');
            imgOut.classList.add('hidden');
            timer.textContent = "Computing cluster inference...";

            setTimeout(() => {
                loader.classList.add('hidden');
                
                if (currentActiveTemplate === 'sd35') {
                    imgOut.classList.remove('hidden');
                    document.getElementById('generatedImgNode').src = "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=800&q=80";
                    timer.textContent = "Latency: 1.64s | Core: Stable Diffusion 3.5 Turbo";
                } else {
                    textOut.classList.remove('hidden');
                    if (currentActiveTemplate === 'marketing') {
                        textOut.innerHTML = `<p class="font-semibold text-slate-900 text-base">🎯 Optimized Marketing Strategy for ${document.getElementById('paramProduct').value}</p><p>We have successfully established a structured copywriting framework tailored precisely for <strong>${document.getElementById('paramAudience').value}</strong>.</p><p><strong>Core Leverage Point:</strong> By isolating user friction and instantly deploying the mechanism to <em>"${document.getElementById('paramGoal').value}"</em>, the onboarding click-through probability expands by up to 22.4%.</p>`;
                        timer.textContent = "Latency: 0.84s | Core: ChatGPT 5.4";
                    } else {
                        textOut.innerHTML = `<p>⚡ <strong>Quick Actions Generation Framework:</strong> Parameter vectors processed successfully. The system has stabilized the generation loop targeting <em>${document.getElementById('paramAudience').value}</em> criteria values.</p>`;
                        timer.textContent = "Latency: 0.22s | Core: nano banana";
                    }
                }
            }, 1200);
        }
    </script>
</body>
</html>
