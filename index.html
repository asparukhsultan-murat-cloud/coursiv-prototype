<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coursiv AI Tools</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Fonts (Inter для интерфейса, Playwrite/Caveat для точной копии логотипа) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playwrite+DK+Uloop:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; }
        .coursiv-brand { font-family: 'Playwrite DK Uloop', cursive; font-weight: 400; color: #6366f1; }
        .main-input-box { box-shadow: 0 8px 30px rgba(0, 0, 0, 0.02); }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col antialiased bg-white select-none">

    <!-- ХЕДЕР ОДИН В ОДИН ПО СКРИНШОТУ -->
    <header class="border-b border-slate-100 bg-white sticky top-0 z-50 px-10 py-3.5 flex items-center justify-between">
        <!-- Левая часть: Фирменный логотип -->
        <div class="flex items-center">
            <span class="text-2xl font-bold coursiv-brand tracking-tight -rotate-3">Coursiv</span>
        </div>
        
        <!-- Центр: Навигация с оригинальными иконками -->
        <nav class="hidden md:flex items-center space-x-7 text-[14px] font-medium text-slate-500">
            <a href="#" class="flex items-center space-x-2 text-slate-400 hover:text-slate-800 transition">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                <span>Home</span>
            </a>
            <a href="#" class="flex items-center space-x-2 text-slate-400 hover:text-slate-800 transition">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
                <span>Courses</span>
            </a>
            <a href="#" class="flex items-center space-x-2 text-indigo-600 font-semibold transition">
                <svg class="w-4 h-4 text-indigo-500" fill="currentColor" viewBox="0 0 24 24"><path d="M11.5 21l-2.28-4.72L4.5 14l4.72-2.28L11.5 7l2.28 4.72L18.5 14l-4.72 2.28L11.5 21zm7-12.5l-.94-1.94L15.62 5.6l1.94-.94L18.5 2.75l.94 1.91 1.94.94-1.94.94-.94 1.96z"/></svg>
                <span>AI Tools</span>
            </a>
            <a href="#" class="flex items-center space-x-2 text-slate-400 hover:text-slate-800 transition">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 002 2h2a2 2 0 002-2z"/></svg>
                <span>AI Practice</span>
            </a>
        </nav>

        <!-- Правая часть хедера -->
        <div class="flex items-center space-x-4">
            <!-- Бесконечный премиум с градиентом внутри капсулы -->
            <div class="border border-slate-200 rounded-full pl-2.5 pr-3 py-1 flex items-center space-x-1 text-xs text-slate-700 font-medium bg-white">
                <span class="text-emerald-400 font-bold text-sm">✦</span>
                <span class="text-slate-900 font-semibold text-sm">∞</span>
            </div>
            <!-- История (Часики) -->
            <button class="text-slate-400 hover:text-slate-600 transition cursor-pointer">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            </button>
            <!-- Профиль -->
            <div class="flex items-center space-x-1.5 cursor-pointer text-slate-400 hover:text-slate-600 transition">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                <span class="text-xs font-medium text-slate-500">Profile</span>
            </div>
        </div>
    </header>

    <!-- ОСНОВНОЙ КАНВАС -->
    <main class="flex-1 max-w-4xl w-full mx-auto px-4 pt-24 flex flex-col items-center">
        
        <!-- Заголовок -->
        <h1 class="text-[25px] font-medium text-slate-900 tracking-tight text-center mb-7">
            What can I help with?
        </h1>

        <!-- ЦЕНТРАЛЬНОЕ ОКНО ВВОДА (Форма х Иконки) -->
        <div class="w-full max-w-[640px] bg-white border border-slate-200 rounded-[24px] p-4 main-input-box transition-all duration-200">
            
            <!-- СОСТОЯНИЕ 1: Стандартная пустая строка -->
            <div id="standardInputBlock" class="w-full">
                <textarea id="mainTextArea" oninput="toggleSubmitBtnState()" placeholder="Ask anything" rows="3" class="w-full resize-none bg-transparent text-[15px] text-slate-800 placeholder-slate-300 focus:outline-none leading-relaxed"></textarea>
            </div>

            <!-- СОСТОЯНИЕ 2: Умная компактная форма (появляется при выборе пилюли) -->
            <div id="smartFormBlock" class="w-full hidden space-y-3 pb-3 pt-1">
                <div class="flex items-center justify-between border-b border-slate-100 pb-2 mb-2">
                    <span id="formBadgeText" class="text-xs font-semibold text-indigo-600 bg-indigo-50/70 px-2 py-0.5 rounded-md">
                        Smart Template Active
                    </span>
                    <button onclick="resetToStandard()" class="text-xs text-slate-400 hover:text-slate-600 font-medium flex items-center space-x-1 cursor-pointer">
                        <span>✕</span> <span>Clear form</span>
                    </button>
                </div>

                <!-- Внутренние аккуратные инпуты под Текст -->
                <div id="textInputsWrapper" class="grid grid-cols-1 sm:grid-cols-2 gap-2.5">
                    <input type="text" id="valProduct" value="Coursiv AI Platform" oninput="compileLivePrompt()" placeholder="Product/Topic Name" class="w-full bg-slate-50/50 border border-slate-200/80 rounded-xl px-3 py-2 text-sm text-slate-800 focus:outline-none focus:border-indigo-500/60 placeholder-slate-400">
                    <input type="text" id="valAudience" value="Digital Marketers" oninput="compileLivePrompt()" placeholder="Target Audience" class="w-full bg-slate-50/50 border border-slate-200/80 rounded-xl px-3 py-2 text-sm text-slate-800 focus:outline-none focus:border-indigo-500/60 placeholder-slate-400">
                    <input type="text" id="valGoal" value="Increase feature activation from 5% to 20%" oninput="compileLivePrompt()" placeholder="Core Objective or Benefit" class="w-full sm:col-span-2 bg-slate-50/50 border border-slate-200/80 rounded-xl px-3 py-2 text-sm text-slate-800 focus:outline-none focus:border-indigo-500/60 placeholder-slate-400">
                </div>

                <!-- Внутренние аккуратные инпуты под Картинки -->
                <div id="imageInputsWrapper" class="hidden grid grid-cols-1 sm:grid-cols-2 gap-2.5">
                    <input type="text" id="valSubject" value="Futuristic modern workspace with warm lightning" oninput="compileLivePrompt()" placeholder="Visual Subject" class="w-full sm:col-span-2 bg-slate-50/50 border border-slate-200/80 rounded-xl px-3 py-2 text-sm text-slate-800 focus:outline-none focus:border-indigo-500/60 placeholder-slate-400">
                    <select id="valStyle" onchange="compileLivePrompt()" class="w-full bg-slate-50/50 border border-slate-200/80 rounded-xl px-3 py-2 text-sm text-slate-700 focus:outline-none focus:border-indigo-500/60 cursor-pointer">
                        <option value="Cinematic photography, volumetric lighting, 8k resolution">Cinematic Photo</option>
                        <option value="3D clay isometric concept art, clean soft lighting">Minimalist 3D Clay</option>
                    </select>
                    <select id="valRatio" onchange="compileLivePrompt()" class="w-full bg-slate-50/50 border border-slate-200/80 rounded-xl px-3 py-2 text-sm text-slate-700 focus:outline-none focus:border-indigo-500/60 cursor-pointer">
                        <option value="16:9 widescreen format">16:9 (Landscape)</option>
                        <option value="9:16 portrait smartphone screen format">9:16 (Portrait)</option>
                    </select>
                </div>
            </div>

            <!-- СТРОКА УПРАВЛЕНИЯ (Иконки внизу инпута - как на скрине) -->
            <div class="flex items-center justify-between border-t border-slate-50 pt-2.5 mt-1">
                <!-- Плюс слева -->
                <button class="text-slate-700 hover:text-slate-900 font-light text-2xl pl-1 cursor-pointer transition select-none">+</button>
                
                <!-- Блок элементов справа -->
                <div class="flex items-center space-x-3.5">
                    <!-- Селектор Модели (Оригинальный вид Claude с шевроном) -->
                    <div class="relative flex items-center">
                        <select id="modelSelect" onchange="handleModelDropdownChange()" class="appearance-none bg-transparent hover:bg-slate-50 rounded-xl pl-2 pr-5 py-1 text-[14px] text-slate-600 font-medium focus:outline-none cursor-pointer transition">
                            <option value="claude">Claude</option>
                            <option value="gpt5">ChatGPT 5.4</option>
                            <option value="sd35">SD 3.5 Turbo</option>
                        </select>
                        <span class="absolute right-1 text-[9px] text-slate-400 pointer-events-none">▼</span>
                    </div>

                    <!-- Микрофон -->
                    <button class="text-slate-400 hover:text-slate-600 transition cursor-pointer">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/></svg>
                    </button>

                    <!-- Круглая кнопка отправки ↑ -->
                    <button id="arrowSubmitBtn" onclick="fireAIRequestPipeline()" class="w-7 h-7 rounded-full bg-slate-100 text-slate-300 flex items-center justify-center font-bold text-xs transition cursor-pointer">
                        ↑
                    </button>
                </div>
            </div>
        </div>

        <!-- ОБРАЗОВАТЕЛЬНЫЙ СЛОЙ: Отрендеренный промпт в реальном времени -->
        <div id="compilerDashboard" class="w-full max-w-[640px] mt-3.5 hidden bg-slate-50 border border-slate-100 rounded-xl p-3 transition-all duration-300">
            <div class="flex items-center justify-between mb-1">
                <span class="text-[10px] font-bold text-indigo-500 uppercase tracking-wider flex items-center space-x-1">
                    <span class="w-1 h-1 rounded-full bg-indigo-400 animate-pulse"></span>
                    <span>Live Prompt Engineer Compiler</span>
                </span>
                <span class="text-[9px] text-slate-400">Coursiv Learning Engine</span>
            </div>
            <div id="compilerTextDisplay" class="text-[11px] font-mono text-slate-400 leading-normal bg-white border border-slate-100 p-2 rounded-lg max-h-16 overflow-y-auto"></div>
        </div>

        <!-- КЛАСТЕР ПИЛЮЛЬ ИЗ СКРИНШОТА (6 ШТУК ОДИН В ОДИН) -->
        <div id="pillsContainer" class="w-full max-w-xl mt-7 flex flex-wrap justify-center gap-2">
            <button onclick="triggerSmartFormSetup('image')" class="px-3 py-1.5 bg-white border border-slate-200 rounded-full text-[13px] text-slate-600 hover:border-indigo-500 hover:text-indigo-600 flex items-center space-x-2 transition cursor-pointer shadow-sm">
                <svg class="w-3.5 h-3.5 text-indigo-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 002-2H4a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                <span>Create an image</span>
            </button>
            <button onclick="triggerSmartFormSetup('text', 'Give advice')" class="px-3 py-1.5 bg-white border border-slate-200 rounded-full text-[13px] text-slate-600 hover:border-indigo-500 hover:text-indigo-600 flex items-center space-x-2 transition cursor-pointer shadow-sm">
                <svg class="w-3.5 h-3.5 text-indigo-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
                <span>Give advice</span>
            </button>
            <button onclick="triggerSmartFormSetup('text', 'Generate ideas')" class="px-3 py-1.5 bg-white border border-slate-200 rounded-full text-[13px] text-slate-600 hover:border-indigo-500 hover:text-indigo-600 flex items-center space-x-2 transition cursor-pointer shadow-sm">
                <svg class="w-3.5 h-3.5 text-indigo-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                <span>Generate ideas</span>
            </button>
            <button onclick="triggerSmartFormSetup('text', 'Summarize text')" class="px-3 py-1.5 bg-white border border-slate-200 rounded-full text-[13px] text-slate-600 hover:border-indigo-500 hover:text-indigo-600 flex items-center space-x-2 transition cursor-pointer shadow-sm">
                <svg class="w-3.5 h-3.5 text-indigo-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                <span>Summarize text</span>
            </button>
            <button onclick="triggerSmartFormSetup('text', 'Analyze data')" class="px-3 py-1.5 bg-white border border-slate-200 rounded-full text-[13px] text-slate-600 hover:border-indigo-500 hover:text-indigo-600 flex items-center space-x-2 transition cursor-pointer shadow-sm">
                <svg class="w-3.5 h-3.5 text-indigo-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                <span>Analyze this data</span>
            </button>
            <button onclick="triggerSmartFormSetup('text', 'Translate text')" class="px-3 py-1.5 bg-white border border-slate-200 rounded-full text-[13px] text-slate-600 hover:border-indigo-500 hover:text-indigo-600 flex items-center space-x-2 transition cursor-pointer shadow-sm">
                <svg class="w-3.5 h-3.5 text-indigo-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 0c-.83 2.766-2.544 5.234-4.5 7.343M11 16a8.954 8.954 0 003-2l3 3m2-3a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1h6z"/></svg>
                <span>Translate this</span>
            </button>
        </div>

        <!-- КОНСОЛЬ ОТВЕТА (Минималистичный аутпут) -->
        <div id="resultsConsole" class="w-full max-w-[640px] mt-6 hidden border border-slate-200 rounded-xl bg-slate-50/30 overflow-hidden shadow-sm transition-all duration-300 mb-20">
            <div class="bg-white border-b border-slate-100 px-4 py-2 flex items-center justify-between text-[11px] text-slate-400 font-mono">
                <span class="flex items-center space-x-1.5">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>
                    <span class="text-slate-500">Inference Response</span>
                </span>
                <span id="speedTimer">Pipeline processing</span>
            </div>
            <div class="p-5 bg-white min-h-[100px] flex items-center justify-center text-sm text-slate-600 text-left leading-relaxed">
                <div id="loaderState" class="flex items-center space-x-2 text-slate-400">
                    <div class="w-4 h-4 border-2 border-slate-200 border-t-indigo-600 rounded-full animate-spin"></div>
                    <span class="font-mono text-xs">Streaming from API...</span>
                </div>
                <div id="textResultState" class="hidden w-full space-y-2"></div>
                <div id="imageResultState" class="hidden w-full flex justify-center">
                    <img id="imgNode" src="" alt="AI Output" class="max-w-xs w-full h-auto rounded-lg border border-slate-100 shadow-sm">
                </div>
            </div>
        </div>

    </main>

    <!-- СЦЕНАРИИ И ЛОГИКА -->
    <script>
        const formulas = {
            text: () => `System directive: act as senior AI expert. Topic core: "${document.getElementById('valProduct').value}". Focus segment: "${document.getElementById('valAudience').value}". Goal matrix parameters: "${document.getElementById('valGoal').value}". Generate balanced structural node responses.`,
            image: () => `High-fidelity commercial asset generation. Object context: "${document.getElementById('valSubject').value}". Stylistic aesthetic: ${document.getElementById('valStyle').value}. Constraints: optimized for ${document.getElementById('valRatio').value} display outputs.`
        };

        let isFormActive = false;
        let formType = 'text';

        function toggleSubmitBtnState() {
            if (isFormActive) return;
            const text = document.getElementById('mainTextArea').value.trim();
            const btn = document.getElementById('arrowSubmitBtn');
            if (text !== "") {
                btn.className = "w-7 h-7 rounded-full bg-indigo-600 text-white flex items-center justify-center font-bold text-xs transition cursor-pointer shadow-sm";
            } else {
                btn.className = "w-7 h-7 rounded-full bg-slate-100 text-slate-300 flex items-center justify-center font-bold text-xs transition cursor-pointer";
            }
        }

        function compileLivePrompt() {
            if (!isFormActive) return;
            const prompt = formulas[formType]();
            document.getElementById('compilerTextDisplay').textContent = prompt;
            
            // Активируем кнопку отправки в режиме формы
            document.getElementById('arrowSubmitBtn').className = "w-7 h-7 rounded-full bg-indigo-600 text-white flex items-center justify-center font-bold text-xs transition cursor-pointer shadow-sm";
        }

        function triggerSmartFormSetup(type, label = 'Smart Form Template') {
            isFormActive = true;
            formType = type;

            document.getElementById('standardInputBlock').classList.add('hidden');
            document.getElementById('smartFormBlock').classList.remove('hidden');
            document.getElementById('compilerDashboard').classList.remove('hidden');
            document.getElementById('resultsConsole').classList.add('hidden');
            
            document.getElementById('formBadgeText').textContent = label;

            if (type === 'text') {
                document.getElementById('textInputsWrapper').classList.remove('hidden');
                document.getElementById('imageInputsWrapper').classList.add('hidden');
                document.getElementById('modelSelect').value = 'gpt5';
            } else {
                document.getElementById('textInputsWrapper').classList.add('hidden');
                document.getElementById('imageInputsWrapper').classList.remove('hidden');
                document.getElementById('modelSelect').value = 'sd35';
            }

            compileLivePrompt();
        }

        function handleModelDropdownChange() {
            const m = document.getElementById('modelSelect').value;
            if (m === 'sd35') {
                triggerSmartFormSetup('image', 'Image Generation Framework');
            } else if (m === 'gpt5' || m === 'claude') {
                triggerSmartFormSetup('text', m === 'gpt5' ? 'ChatGPT 5.4 Form Engine' : 'Claude Prompt Variables');
            }
        }

        function resetToStandard() {
            isFormActive = false;
            document.getElementById('standardInputBlock').classList.remove('hidden');
            document.getElementById('smartFormBlock').classList.add('hidden');
            document.getElementById('compilerDashboard').classList.add('hidden');
            document.getElementById('resultsConsole').classList.add('hidden');
            document.getElementById('mainTextArea').value = "";
            document.getElementById('modelSelect').value = 'claude';
            toggleSubmitBtnState();
        }

        function fireAIRequestPipeline() {
            const btn = document.getElementById('arrowSubmitBtn');
            if (btn.classList.contains('text-slate-300')) return; // Блокировка пустого клика

            const consoleBox = document.getElementById('resultsConsole');
            const loader = document.getElementById('loaderState');
            const txtOut = document.getElementById('textResultState');
            const imgOut = document.getElementById('imageResultState');
            const timer = document.getElementById('speedTimer');

            consoleBox.classList.remove('hidden');
            loader.classList.remove('hidden');
            txtOut.classList.add('hidden');
            imgOut.classList.add('hidden');
            timer.textContent = "Calculating vectors...";

            setTimeout(() => {
                loader.classList.add('hidden');
                if (!isFormActive) {
                    txtOut.classList.remove('hidden');
                    txtOut.innerHTML = `<p class="font-medium text-slate-900">Standard Model Generation</p><p class="text-xs text-slate-500 mt-1">Processed raw input string. To test variables engine, select any filter capsule below the search bar.</p>`;
                    timer.textContent = "Latency: 0.48s | Raw Text Model";
                } else if (formType === 'image') {
                    imgOut.classList.remove('hidden');
                    document.getElementById('imgNode').src = "https://images.unsplash.com/photo-1634017839464-5c339ebe3cb4?auto=format&fit=crop&w=600&q=80";
                    timer.textContent = "Latency: 1.25s | Core: SD 3.5 Turbo";
                } else {
                    txtOut.classList.remove('hidden');
                    txtOut.innerHTML = `<p class="font-medium text-slate-900">Variables Processed for ${document.getElementById('valProduct').value}</p><p class="text-xs text-slate-600 mt-1">Successfully synthesized response schema optimized directly for <strong>${document.getElementById('valAudience').value}</strong> cohort rules. Target metric constraint vector set to "${document.getElementById('valGoal').value}".</p>`;
                    timer.textContent = "Latency: 0.71s | Engine: ChatGPT 5.4";
                }
            }, 1000);
        }
    </script>
</body>
</html>
